spring.application.name=Camplog

# MySQL (환경변수 우선, 없으면 로컬 개발 기본값 사용)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/camplog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:mysql}

# 운영: validate 또는 none 으로 변경할 것 (환경변수로 주입)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# 운영에서는 false로 (환경변수로 주입)
spring.jpa.show-sql=${SHOW_SQL:true}

# JWT (운영 환경에서는 반드시 환경변수 JWT_SECRET 주입)
jwt.secret=${JWT_SECRET:mySecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!!}
jwt.expiration=3600000
jwt.refresh-expiration=604800000

cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177}

# Jackson: LocalDateTime을 ISO-8601 문자열로 직렬화
spring.jackson.serialization.write-dates-as-timestamps=false